<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vault{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1f512;</text></svg>">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .vault-layout { display: flex; min-height: 100vh; }
        .vault-nav {
            width: 220px;
            padding: 1.25rem 0.75rem;
            border-right: 1px solid var(--pico-muted-border-color);
            flex-shrink: 0;
        }
        /* Override Pico's `nav ul { display: flex }` default, which collapses a vertical sidebar. */
        .vault-nav ul {
            display: block;
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .vault-nav li {
            display: block;
            padding: 0;
        }
        .vault-nav > ul:first-child {
            margin-bottom: 0.5rem;
            padding: 0.25rem 0.75rem 0.75rem;
            border-bottom: 1px solid var(--pico-muted-border-color);
            font-size: 1.05rem;
            letter-spacing: 0.01em;
        }
        .vault-nav a {
            display: block;
            padding: 0.5rem 0.75rem;
            margin: 0.125rem 0;
            border-radius: 0.375rem;
            color: var(--pico-color);
            text-decoration: none;
            transition: background-color 120ms ease-out;
        }
        .vault-nav a:hover {
            background: color-mix(in oklch, var(--pico-muted-border-color) 50%, transparent);
            text-decoration: none;
        }
        .vault-nav a[aria-current="page"] {
            background: color-mix(in oklch, var(--pico-primary) 12%, transparent);
            color: var(--pico-primary);
            font-weight: 600;
        }
        .vault-main { flex: 1; padding: 2rem; }
        .vault-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0.5rem; color: var(--pico-color); }
        .vault-topbar { display: none; }
        .stat-value { font-size: 2rem; margin: 0; }
        .btn-sm { padding: 0.25rem 0.75rem; font-size: 0.85rem; }
        ins.status, del.status { text-decoration: none; }
        .status-ok { color: var(--pico-ins-color); }
        .status-fail { color: var(--pico-del-color); }
        .sse-banner {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 0.5rem; text-align: center; font-size: 0.85rem;
            background: var(--pico-del-color); color: var(--pico-background-color); z-index: 999;
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }
        @media (max-width: 768px) {
            .vault-layout { flex-direction: column; }
            .vault-nav { display: none; width: 100%; border-right: none; border-bottom: 1px solid var(--pico-muted-border-color); }
            .vault-nav.open { display: block; }
            .vault-topbar {
                display: flex; align-items: center; justify-content: space-between;
                padding: 0.5rem 1rem; border-bottom: 1px solid var(--pico-muted-border-color);
            }
            .vault-toggle { display: inline-block; }
            .vault-main { padding: 1rem; }
            .vault-nav li { padding: 0.5rem 0; }
            .btn-sm { min-height: 44px; }
            table { font-size: 0.85rem; }
            .hide-mobile { display: none; }
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
    <div class="vault-topbar">
        <strong>Vault</strong>
        <button class="vault-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.vault-nav').classList.toggle('open')">&#9776;</button>
    </div>
    <div class="vault-layout">
        <nav class="vault-nav" aria-label="Main navigation">
            <ul>
                <li><strong>Vault</strong></li>
            </ul>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/credentials">Credentials</a></li>
                <li><a href="/profiles">Profiles</a></li>
                <li><a href="/stats">Stats</a></li>
                <li><a href="/sessions">Sessions</a></li>
            </ul>
        </nav>
        <main class="vault-main container">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
    // Format ISO timestamps into human-readable local time.
    function formatTimestamps() {
        document.querySelectorAll('time[datetime]').forEach(function(el) {
            var d = new Date(el.getAttribute('datetime'));
            if (isNaN(d)) return;
            var now = new Date();
            var diff = (now - d) / 1000;
            if (diff < -86400) { el.textContent = 'in ' + Math.floor(-diff / 86400) + 'd'; }
            else if (diff < -3600) { el.textContent = 'in ' + Math.floor(-diff / 3600) + 'h'; }
            else if (diff < -60) { el.textContent = 'in ' + Math.floor(-diff / 60) + 'm'; }
            else if (diff < 0) { el.textContent = 'soon'; }
            else if (diff < 60) { el.textContent = 'just now'; }
            else if (diff < 3600) { el.textContent = Math.floor(diff / 60) + 'm ago'; }
            else if (diff < 86400) { el.textContent = Math.floor(diff / 3600) + 'h ago'; }
            else if (diff < 604800) { el.textContent = Math.floor(diff / 86400) + 'd ago'; }
            else { el.textContent = d.toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'}); }
            el.title = d.toLocaleString();
        });
    }
    formatTimestamps();
    // Re-format after htmx swaps.
    document.body.addEventListener('htmx:afterSwap', formatTimestamps);

    // Mark active nav link and close mobile nav on click.
    (function() {
        var path = window.location.pathname;
        var nav = document.querySelector('.vault-nav');
        document.querySelectorAll('.vault-nav a').forEach(function(a) {
            if (a.getAttribute('href') === path) {
                a.setAttribute('aria-current', 'page');
            }
            a.addEventListener('click', function() { nav.classList.remove('open'); });
        });
    })();
    // SSE live updates with reconnection.
    (function() {
        var retries = 0;
        var maxRetries = 5;
        var banner = null;

        function showBanner(msg) {
            if (!banner) {
                banner = document.createElement('div');
                banner.id = 'sse-banner';
                banner.className = 'sse-banner';
                banner.setAttribute('role', 'status');
                document.body.appendChild(banner);
            }
            banner.textContent = msg;
            banner.style.display = '';
        }

        function hideBanner() {
            if (banner) banner.style.display = 'none';
        }

        function connect() {
            var es = new EventSource('/api/events');

            es.onopen = function() {
                retries = 0;
                hideBanner();
            };

            // Swap only `<main>`'s inner content, extracted from the
            // server's full-document response. Previously used
            // `htmx.ajax(…{target:'main', swap:'innerHTML'})`, which
            // dumped the entire returned `<html>` tree — nav, topbar
            // and all — inside `<main>`, producing a duplicated nav
            // after every SSE event. (Rare before UAT-FIND-005 was
            // fixed, because `credential` only fired on add/remove;
            // visible on every toggle now.)
            function refreshMain() {
                fetch(window.location.pathname, { headers: { 'Accept': 'text/html' } })
                    .then(function (r) { return r.text(); })
                    .then(function (html) {
                        var doc = new DOMParser().parseFromString(html, 'text/html');
                        var nextMain = doc.querySelector('main.vault-main');
                        var curMain = document.querySelector('main.vault-main');
                        if (nextMain && curMain) {
                            curMain.innerHTML = nextMain.innerHTML;
                            if (window.htmx) htmx.process(curMain);
                            formatTimestamps();
                        }
                    })
                    .catch(function () { /* swallow — next tick will retry */ });
            }
            ['stats', 'credential', 'lease'].forEach(function (evt) {
                es.addEventListener(evt, refreshMain);
            });

            es.onerror = function() {
                es.close();
                retries++;
                if (retries <= maxRetries) {
                    var delay = Math.min(2000 * Math.pow(2, retries - 1), 30000);
                    showBanner('Live updates disconnected. Reconnecting...');
                    setTimeout(connect, delay);
                } else {
                    showBanner('Live updates offline. Reload page to reconnect.');
                }
            };
        }

        connect();
    })();
    </script>
</body>
</html>
