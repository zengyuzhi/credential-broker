{% extends "base.html" %}
{% block title %}Credentials — Vault{% endblock %}
{% block head_extra %}
<meta name="csrf-token" content="{{ csrf_token }}">
<script>
document.body.addEventListener('htmx:configRequest', function(evt) {
    var meta = document.querySelector('meta[name="csrf-token"]');
    if (meta) {
        evt.detail.headers['X-CSRF-Token'] = meta.content;
    }
});
</script>
{% endblock %}
{% block content %}
<h2>Credentials</h2>
{% if credentials.is_empty() %}
<p>No credentials stored. Use <code>vault credential add</code> to add one.</p>
{% else %}
<figure>
    <table>
        <thead>
            <tr>
                <th scope="col">Provider</th>
                <th scope="col">Label</th>
                <th scope="col" class="hide-mobile">Environment</th>
                <th scope="col" class="hide-mobile">Kind</th>
                <th scope="col">Status</th>
                <th scope="col" class="hide-mobile">Last Used</th>
                <th scope="col">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for credential in credentials %}
            {% include "credential_row.html" %}
            {% endfor %}
        </tbody>
    </table>
</figure>
{% endif %}
{% endblock %}
